benchmark: judgebench_gpt
data_source: ${SKILLRM_DATA_ROOT}/judgebench/gpt.jsonl
data_sources:
  - path: ${SKILLRM_DATA_ROOT}/judgebench/gpt.jsonl
    source: gpt
  - path: ${SKILLRM_DATA_ROOT}/judgebench/claude.jsonl
    source: claude
output_dir: runs/baseline/judgebench
evaluation_mode: pairwise_baseline
model: ${SKILLRM_MODEL}
base_urls: ${SKILLRM_BASE_URLS}
seed: 0
workers: 80
resume: true
temperature: 0.0
top_p: 1.0
max_tokens: 4096
enable_thinking: false
send_thinking_field: false
save_reasoning: false
timeout: 300
retries: 2
progress_every: 25
setting_name: baseline
