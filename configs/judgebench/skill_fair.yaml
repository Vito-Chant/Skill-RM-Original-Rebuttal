benchmark: judgebench_gpt
data_source: ${SKILLRM_DATA_ROOT}/judgebench/gpt.jsonl
data_sources:
  - path: ${SKILLRM_DATA_ROOT}/judgebench/gpt.jsonl
    source: gpt
  - path: ${SKILLRM_DATA_ROOT}/judgebench/claude.jsonl
    source: claude
output_dir: runs/skill_fair/judgebench
evaluation_mode: self_select_skill_pairwise
skill_path: skills/reward_judge_fair
skill_loading_mode: progressive
skill_allowed_setting: skill_fair
baseline_fallback_query_types: false
judgebench_use_system_prompt: true
judgebench_system_prompt_style: minimal
judgebench_skill_trigger_policy: answer_selection
model: ${SKILLRM_MODEL}
base_urls: ${SKILLRM_BASE_URLS}
seed: 0
workers: 80
resume: true
temperature: 0.0
top_p: 1.0
max_tokens: 4096
enable_thinking: false
send_thinking_field: false
save_reasoning: false
timeout: 300
retries: 2
progress_every: 25
record_trace: true
tool_choice: required
max_agent_steps: 5
max_resources_per_sample: 4
max_resource_chars: 8000
allowed_skill_scripts: []
enable_python_sandbox: true
python_sandbox_timeout: 3
python_sandbox_max_code_chars: 6000
python_sandbox_max_output_chars: 4000
enable_delegated_agents: false
enable_forced_finalization: true
forced_finalization_use_final_answer_tool: true
forced_finalization_max_tokens: 1024
forced_finalization_retry_text: true
forced_finalization_retry_max_tokens: 1024
emergency_direct_judge_finalization: true
emergency_direct_judge_max_tokens: 2048
setting_name: skill_fair
