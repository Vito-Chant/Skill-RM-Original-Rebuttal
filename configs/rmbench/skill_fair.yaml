workers: 160
resume: true
temperature: 0.0
top_p: 1.0
max_tokens: 4096
enable_thinking: false
send_thinking_field: false
save_reasoning: false
timeout: 300
retries: 2
progress_every: 100
record_trace: true
tool_choice: auto
