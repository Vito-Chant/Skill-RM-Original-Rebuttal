max_resources_per_sample: 4
max_resource_chars: 8000
allowed_skill_scripts: []
enable_python_sandbox: true
python_sandbox_timeout: 3
python_sandbox_max_code_chars: 6000
python_sandbox_max_output_chars: 4000
enable_delegated_agents: false
